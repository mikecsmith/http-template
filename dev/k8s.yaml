# Workload + Gateway wiring for local dev.
#
# This file is rendered by the Tiltfile: occurrences of __BASE_DOMAIN__
# are replaced with the BASE_DOMAIN starlark variable (default
# `cluster.localhost`) before being passed to k8s_yaml. Keep that
# placeholder string exact — no quoting, no templating syntax beyond it.
#
# Routing topology (all via Traefik on the kind node, exposed to host
# :80 and :443 by ctlptl/kind extraPortMappings):
#
#   http://*.cluster.localhost  → 301 to https (single wildcard route)
#   https://cluster.localhost   → http-template Service :8080
#   https://traefik.cluster.localhost → traefik dashboard
#
# The container runs as the distroless `nonroot` UID 65532 with a
# read-only root filesystem — matches the production image's security
# posture so we catch permission issues during dev rather than at
# deploy time.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-template
  labels:
    app: http-template
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-template
  template:
    metadata:
      labels:
        app: http-template
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: http-template
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LOG_LEVEL
              value: info
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: http-template
spec:
  selector:
    app: http-template
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: cluster-tls
      allowedRoutes:
        namespaces:
          from: Same
---
# Single wildcard redirect: anything on :80 → https. Hostnames omitted
# so it matches every request that hits the http listener.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redirect-to-https
spec:
  parentRefs:
    - name: gateway
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-template
spec:
  parentRefs:
    - name: gateway
      sectionName: https
  hostnames:
    - "__BASE_DOMAIN__"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: http-template
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: traefik-dashboard
spec:
  parentRefs:
    - name: gateway
      sectionName: https
  hostnames:
    - "traefik.__BASE_DOMAIN__"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: traefik-dashboard
          port: 8080

# Workload + Gateway wiring for local dev.
#
# This file is rendered by the Tiltfile: occurrences of ${BASE_DOMAIN}
# and ${APP_NAME} are replaced before being passed to k8s_yaml.
#   ${BASE_DOMAIN}  → BASE_DOMAIN  (default `cluster.localhost`)
#   ${APP_NAME}     → APP_NAME     (basename of the go.mod module path)
# Keep both placeholder strings exact — no quoting, no templating syntax
# beyond them. The YAML stays valid as-is so editor/lint tooling works
# without an extra render step.
#
# Routing topology (all via Traefik on the kind node, exposed to host
# :80 and :443 by ctlptl/kind extraPortMappings):
#
#   http://*.cluster.localhost              → 301 to https (wildcard)
#   https://apis.cluster.localhost/<app>/*  → <app> Service :8080
#                                             (URLRewrite strips the
#                                              /<app> prefix before
#                                              forwarding to the pod)
#   https://traefik.cluster.localhost       → traefik dashboard
#
# The `api.` host is the shared multi-API entry point — every service
# in this cluster mounts under it at /<service-name>/*. Adding a new
# service is one HTTPRoute with a fresh prefix; no extra hostnames or
# wildcard cert reissuance needed.
#
# The container runs as the distroless `nonroot` UID 65532 to match
# the production image's security posture. We deliberately do NOT set
# readOnlyRootFilesystem here — Tilt's live_update needs to overwrite
# /server on sync and touch /tmp/.restart-proc to signal the
# tilt-restart-wrapper, and both live on the container rootfs. Prod
# hardening still comes from the goreleaser-built distroless image.
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/deployment-apps-v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APP_NAME}
  labels:
    app: ${APP_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${APP_NAME}
  template:
    metadata:
      labels:
        app: ${APP_NAME}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: ${APP_NAME}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LOG_LEVEL
              value: info
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/service-v1.json
apiVersion: v1
kind: Service
metadata:
  name: ${APP_NAME}
spec:
  selector:
    app: ${APP_NAME}
  ports:
    - name: http
      port: 8080
      targetPort: http
---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/gateway.networking.k8s.io/gateway_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: cluster-tls
      allowedRoutes:
        namespaces:
          from: Same
---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/gateway.networking.k8s.io/httproute_v1.json
# Single wildcard redirect: anything on :80 → https. Hostnames omitted
# so it matches every request that hits the http listener.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redirect-to-https
spec:
  parentRefs:
    - name: gateway
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${APP_NAME}
spec:
  parentRefs:
    - name: gateway
      sectionName: https
  hostnames:
    - "api.${BASE_DOMAIN}"
  # Multi-API gateway pattern: every backend is mounted under
  # /<app-name>/* on the shared `api.` host. The URLRewrite filter
  # strips the prefix before forwarding so the Go service keeps a flat
  # route table (`/hello`, not `/${APP_NAME}/hello`) — the mount point
  # is purely a gateway concern and the app stays unaware of it.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /${APP_NAME}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: ${APP_NAME}
          port: 8080
---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: traefik-dashboard
spec:
  parentRefs:
    - name: gateway
      sectionName: https
  hostnames:
    - "traefik.${BASE_DOMAIN}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: traefik-dashboard
          port: 8080

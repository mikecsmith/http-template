[tools]
go = "1.26"
golangci-lint = "latest"
lefthook = "latest"
goreleaser = "latest"
act = "latest"
mkcert = "latest"
tilt = "latest"
ctlptl = "latest"

[tasks.dev-build]
description = "Compile a linux dev binary at dist/dev/server for Tilt live_update"
# Build to a temp path and rename into place so Tilt's file watcher
# sees a single atomic update instead of a half-written binary. Racing
# the write leaves Tilt stuck in "Updating..." waiting for the file to
# settle.
run = """
set -euo pipefail
mkdir -p dist/dev
CGO_ENABLED=0 GOOS=linux GOARCH=$(go env GOHOSTARCH) go build -o dist/dev/server.tmp ./cmd/server
mv dist/dev/server.tmp dist/dev/server
"""

[tasks.cluster-up]
description = "Bring up the local kind cluster + registry with mkcert CA mounted"
run = "./dev/cluster-up"

[tasks.cluster-down]
description = "Tear down the local kind cluster + registry"
run = "ctlptl delete -f dist/dev/cluster.yaml 2>/dev/null || ctlptl delete cluster kind-http-template"

[tasks.snapshot]
description = "Build a multi-arch snapshot release locally (no push)"
run = "goreleaser release --snapshot --clean --skip=publish"

[tasks.release-check]
description = "Validate the .goreleaser.yaml config"
run = "goreleaser check"

[tasks.act-ci]
description = "Run the CI workflow locally via act (requires Docker)"
run = "act pull_request -W .github/workflows/ci.yaml --container-architecture linux/arm64"

[tasks.act-dependabot]
description = "Run the dependabot automerge workflow locally via act (requires Docker)"
run = "act pull_request -W .github/workflows/dependabot-automerge.yaml --container-architecture linux/arm64"

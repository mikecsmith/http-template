version: 2

# project_name is intentionally omitted: goreleaser defaults it to the
# git remote repo name, falling back to the working directory. That makes
# this config portable across `gonew`-derived projects without edits.

# IMAGE_OWNER drives the GHCR namespace below. In CI it comes from the
# GitHub Actions context (GITHUB_REPOSITORY_OWNER, lowercased to satisfy
# GHCR's repository-name rules). For local snapshot builds where that
# var is unset, we fall back to `local` so `mise run snapshot` works
# without any environment setup.
env:
  - IMAGE_OWNER={{ if index .Env "GITHUB_REPOSITORY_OWNER" }}{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}{{ else }}local{{ end }}

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    main: ./cmd/server
    binary: server
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_v{{ .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

dockers_v2:
  - images:
      - "ghcr.io/{{ .Env.IMAGE_OWNER }}/{{ .ProjectName }}"
    tags:
      - "{{ .Version }}"
      - "{{ if not .IsSnapshot }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.licenses": "MIT"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-{{ .ShortCommit }}"

changelog:
  disable: true
